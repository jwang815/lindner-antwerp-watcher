name: Lindner Antwerp room watcher

# Checks Hyatt (direct) + Trip.com every 30 minutes for the stay 16–20 Jul 2026.
# GitHub's scheduler can lag 5–15 min under load; cadence is best-effort.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_alert:
        description: "Send a test alert this run even if sold out"
        type: boolean
        default: false

permissions:
  contents: write   # commit state.json back
  issues: write     # open the alert issue (emails you via @mention)

concurrency:
  group: lindner-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1

      - name: Install Playwright + Chromium
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Run availability check
        env:
          OWNER_HANDLE: jwang815
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_ALERT: ${{ inputs.force_alert }}
          # Optional direct email — add these repo secrets to enable Gmail SMTP:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python checker.py

      - name: Persist state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update watcher state [skip ci]"
            git push
          else
            echo "no state change"
          fi
